<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <!-- Background -->
    <rect id="bg" width="500" height="500" fill="#0a0a0a"/>

    <!-- Green glow filter for accent nodes -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle noise grain overlay -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic"/>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="500" height="500" fill="#0a0a0a"/>

  <!-- Subtle radial gradient for depth -->
  <radialGradient id="depthGrad" cx="50%" cy="45%" r="55%">
    <stop offset="0%" stop-color="#1a2e10" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
  </radialGradient>
  <rect width="500" height="500" fill="url(#depthGrad)"/>

  <!-- ============================================================
       BIRD MARK — Geometric, asymmetric, built from broken lines
       Symbolizes: freedom, hard work, regret (left broken wing),
       ambition (right full wing), and upward motion
       ============================================================ -->

  <!-- === LEFT WING (broken/fragmented = regret, past) === -->
  <!-- Primary broken left wing -->
  <path d="M 250 205
            L 195 175
            L 168 188
            L 150 170
            L 130 182
            L 108 165"
        fill="none" stroke="#f5f5f0" stroke-width="2.2"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>

  <!-- Left wing secondary feather — fades/fragments -->
  <path d="M 195 175
            L 178 200
            L 158 208
            L 140 202"
        fill="none" stroke="#f5f5f0" stroke-width="1.6"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>

  <!-- Left wing tertiary — barely visible, dissolving -->
  <path d="M 168 188
            L 155 215
            L 142 220"
        fill="none" stroke="#f5f5f0" stroke-width="1.1"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.28"/>

  <!-- Fragmented dot trail left (regret, things left behind) -->
  <circle cx="105" cy="163" r="1.8" fill="#4a8520" opacity="0.7"/>
  <circle cx="94" cy="157" r="1.3" fill="#4a8520" opacity="0.45"/>
  <circle cx="82" cy="152" r="0.9" fill="#4a8520" opacity="0.25"/>

  <!-- === RIGHT WING (full/strong = ambition, future, hard work) === -->
  <!-- Primary right wing — bold and sweeping -->
  <path d="M 250 205
            L 298 168
            L 325 155
            L 350 145
            L 372 152
            L 390 138"
        fill="none" stroke="#f5f5f0" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round" opacity="1"/>

  <!-- Right wing secondary feather — strong -->
  <path d="M 298 168
            L 315 192
            L 340 200
            L 362 195
            L 382 185"
        fill="none" stroke="#f5f5f0" stroke-width="1.9"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>

  <!-- Right wing tertiary — still visible -->
  <path d="M 325 155
            L 338 185
            L 358 210
            L 372 215"
        fill="none" stroke="#f5f5f0" stroke-width="1.4"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>

  <!-- Right wing quaternary — subtle -->
  <path d="M 350 145
            L 358 178
            L 368 210"
        fill="none" stroke="#f5f5f0" stroke-width="0.9"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.32"/>

  <!-- === BODY / SPINE of bird === -->
  <path d="M 250 205
            L 248 230
            L 252 255
            L 248 278"
        fill="none" stroke="#f5f5f0" stroke-width="2.0"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>

  <!-- === HEAD — small, determined === -->
  <!-- Beak direction: slightly upward (looking toward future) -->
  <path d="M 250 205
            L 258 188
            L 270 178
            L 278 168"
        fill="none" stroke="#f5f5f0" stroke-width="2.0"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

  <!-- Head dot (the eye — a single point of awareness) -->
  <circle cx="266" cy="182" r="3.5" fill="#4a8520" filter="url(#glow)"/>
  <circle cx="266" cy="182" r="1.8" fill="#f5f5f0"/>

  <!-- === TAIL — downward sweep, grounded === -->
  <path d="M 248 278
            L 238 295
            L 228 305"
        fill="none" stroke="#f5f5f0" stroke-width="1.8"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  <path d="M 248 278
            L 252 298
            L 258 310"
        fill="none" stroke="#f5f5f0" stroke-width="1.4"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>

  <!-- ============================================================
       CONNECTION NODES — dots & lines symbolizing
       collaboration, building bridges with others
       ============================================================ -->

  <!-- Primary anchor nodes (people / connections) -->
  <!-- Node at right wing tip -->
  <circle cx="390" cy="138" r="4.5" fill="none" stroke="#3a6b1a" stroke-width="1.5" opacity="0.8"/>
  <circle cx="390" cy="138" r="2" fill="#6aab30" filter="url(#glow)" opacity="0.9"/>

  <!-- Node at left tip -->
  <circle cx="108" cy="165" r="4.5" fill="none" stroke="#3a6b1a" stroke-width="1.5" opacity="0.5"/>
  <circle cx="108" cy="165" r="1.5" fill="#4a8520" opacity="0.6"/>

  <!-- Node at body center — the self -->
  <circle cx="250" cy="230" r="5.5" fill="none" stroke="#4a8520" stroke-width="1.5" opacity="0.7"/>
  <circle cx="250" cy="230" r="2.5" fill="#6aab30" filter="url(#glow)" opacity="0.8"/>

  <!-- Thin connecting lines between nodes (collaboration, network) -->
  <line x1="390" y1="138" x2="250" y2="230"
        stroke="#2d5016" stroke-width="0.8" stroke-dasharray="4,6" opacity="0.5"/>
  <line x1="108" y1="165" x2="250" y2="230"
        stroke="#2d5016" stroke-width="0.8" stroke-dasharray="4,6" opacity="0.3"/>

  <!-- Floating micro-nodes (other people, connections reached) -->
  <circle cx="182" cy="145" r="2" fill="#3a6b1a" opacity="0.5"/>
  <circle cx="330" cy="130" r="2.2" fill="#3a6b1a" opacity="0.55"/>
  <circle cx="370" cy="190" r="1.8" fill="#3a6b1a" opacity="0.4"/>
  <circle cx="148" cy="175" r="1.5" fill="#3a6b1a" opacity="0.35"/>

  <!-- ============================================================
       UPWARD MOTION LINES — trajectory, progress, perseverance
       ============================================================ -->
  <!-- Thin vertical accent lines suggesting upward movement -->
  <line x1="250" y1="130" x2="250" y2="110"
        stroke="#4a8520" stroke-width="0.8" opacity="0.4"/>
  <line x1="253" y1="118" x2="253" y2="100"
        stroke="#4a8520" stroke-width="0.5" opacity="0.22"/>

  <!-- ============================================================
       HORIZONTAL RULE — separator, grounding line
       ============================================================ -->
  <line x1="155" y1="340" x2="345" y2="340"
        stroke="#2d5016" stroke-width="0.8" opacity="0.6"/>

  <!-- Flanking dots on rule -->
  <circle cx="150" cy="340" r="2" fill="#3a6b1a" opacity="0.5"/>
  <circle cx="350" cy="340" r="2" fill="#3a6b1a" opacity="0.5"/>

  <!-- ============================================================
       WORDMARK — AFA initials (Playfair Display character)
       Using SVG text with embedded fallback
       ============================================================ -->
  <text x="250" y="382"
        font-family="'Playfair Display', 'Georgia', 'Times New Roman', serif"
        font-size="36"
        font-weight="700"
        fill="#f5f5f0"
        text-anchor="middle"
        letter-spacing="14"
        opacity="0.95">AFA</text>

  <!-- Subtext — tagline -->
  <text x="250" y="408"
        font-family="'DM Sans', 'Helvetica Neue', 'Arial', sans-serif"
        font-size="9"
        font-weight="300"
        fill="#4a8520"
        text-anchor="middle"
        letter-spacing="5"
        opacity="0.85">ADWIKA FARSHA ARDHAN</text>

  <!-- ============================================================
       SUBTLE CORNER MARKS — editorial, intentional
       ============================================================ -->
  <!-- Top-left corner mark -->
  <path d="M 38 38 L 38 55 M 38 38 L 55 38"
        stroke="#2d5016" stroke-width="1" opacity="0.4" fill="none"/>
  <!-- Bottom-right corner mark -->
  <path d="M 462 462 L 462 445 M 462 462 L 445 462"
        stroke="#2d5016" stroke-width="1" opacity="0.4" fill="none"/>
</svg>
